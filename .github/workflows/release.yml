name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────────────────────────────
  # macOS arm64
  # ─────────────────────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Go Agent (macOS arm64)
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME}"
          HASH="$(git log -n1 --pretty=format:'%h-%cd' --date=format:%y%m%d)"
          mkdir -p ../resources/binaries
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.buildVersion=${VERSION} \
              -X main.gitHash=${HASH} \
              -X main.release=true" \
            -o=../resources/binaries/agent-aarch64-apple-darwin ./main.go

      - name: Download FFmpeg (macOS arm64 static)
        run: |
          mkdir -p resources/binaries
          curl -L -o /tmp/ffmpeg.zip "https://www.osxexperts.net/ffmpeg80arm.zip"
          curl -L -o /tmp/ffprobe.zip "https://www.osxexperts.net/ffprobe80arm.zip"
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg-dl
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe-dl
          cp /tmp/ffmpeg-dl/ffmpeg resources/binaries/ffmpeg-aarch64-apple-darwin
          cp /tmp/ffprobe-dl/ffprobe resources/binaries/ffprobe-aarch64-apple-darwin
          chmod +x resources/binaries/ffmpeg-aarch64-apple-darwin resources/binaries/ffprobe-aarch64-apple-darwin
          xattr -dr com.apple.quarantine resources/binaries/ffmpeg-aarch64-apple-darwin resources/binaries/ffprobe-aarch64-apple-darwin || true
          codesign -s - resources/binaries/ffmpeg-aarch64-apple-darwin resources/binaries/ffprobe-aarch64-apple-darwin

      - name: Verify sidecar binaries
        run: |
          echo "=== binaries ==="
          ls -lh resources/binaries/
          file resources/binaries/agent-aarch64-apple-darwin
          file resources/binaries/ffmpeg-aarch64-apple-darwin
          file resources/binaries/ffprobe-aarch64-apple-darwin
          resources/binaries/ffmpeg-aarch64-apple-darwin -version 2>&1 | head -1

      - name: Build frontend + Electron
        run: npx vite build

      - name: Package Electron app (macOS arm64)
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject signing script into DMG
        run: |
          for f in release/*.dmg; do
            [ -f "$f" ] && ./build/inject-signing-script.sh "$f"
          done

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd release
          for f in *.dmg; do
            mv "$f" "FFAgent-${VERSION}-darwin-arm64.dmg"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFAgent-darwin-arm64
          path: release/FFAgent-*-darwin-arm64.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Windows amd64
  # ─────────────────────────────────────────────────────────────
  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Go Agent (Windows amd64)
        working-directory: agent
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          HASH="$(git log -n1 --pretty=format:'%h-%cd' --date=format:%y%m%d)"
          mkdir -p ../resources/binaries
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.buildVersion=${VERSION} \
              -X main.gitHash=${HASH} \
              -X main.release=true" \
            -o=../resources/binaries/agent-x86_64-pc-windows-msvc.exe ./main.go

      - name: Download FFmpeg (Windows amd64)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg-win" -Force
          $ffDir = Get-ChildItem "$env:TEMP\ffmpeg-win" -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)\bin\ffmpeg.exe" "resources\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item "$($ffDir.FullName)\bin\ffprobe.exe" "resources\binaries\ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Verify sidecar binaries
        shell: bash
        run: |
          echo "=== binaries ==="
          ls -lh resources/binaries/
          file resources/binaries/agent-x86_64-pc-windows-msvc.exe
          file resources/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          file resources/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Build frontend + Electron
        run: npx vite build

      - name: Package Electron app (Windows amd64)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd release
          for f in *.exe; do
            mv "$f" "FFAgent-${VERSION}-windows-amd64-setup.exe"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFAgent-windows-amd64
          path: release/FFAgent-*-windows-amd64-setup.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Linux amd64
  # ─────────────────────────────────────────────────────────────
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Go Agent (Linux amd64)
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME}"
          HASH="$(git log -n1 --pretty=format:'%h-%cd' --date=format:%y%m%d)"
          mkdir -p ../resources/binaries
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.buildVersion=${VERSION} \
              -X main.gitHash=${HASH} \
              -X main.release=true" \
            -o=../resources/binaries/agent-x86_64-unknown-linux-gnu ./main.go

      - name: Download FFmpeg (Linux amd64 static)
        run: |
          mkdir -p resources/binaries
          curl -L -o /tmp/ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          FF_DIR=$(ls -d /tmp/ffmpeg-master-*-linux64-gpl 2>/dev/null | head -1)
          cp "${FF_DIR}/bin/ffmpeg" resources/binaries/ffmpeg-x86_64-unknown-linux-gnu
          cp "${FF_DIR}/bin/ffprobe" resources/binaries/ffprobe-x86_64-unknown-linux-gnu
          chmod +x resources/binaries/ffmpeg-x86_64-unknown-linux-gnu resources/binaries/ffprobe-x86_64-unknown-linux-gnu

      - name: Verify sidecar binaries
        run: |
          echo "=== binaries ==="
          ls -lh resources/binaries/
          file resources/binaries/agent-x86_64-unknown-linux-gnu
          file resources/binaries/ffmpeg-x86_64-unknown-linux-gnu
          file resources/binaries/ffprobe-x86_64-unknown-linux-gnu
          resources/binaries/ffmpeg-x86_64-unknown-linux-gnu -version 2>&1 | head -1

      - name: Build frontend + Electron
        run: npx vite build

      - name: Package Electron app (Linux amd64)
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd release
          for f in *.AppImage; do
            mv "$f" "FFAgent-${VERSION}-linux-amd64.AppImage"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFAgent-linux-amd64
          path: release/FFAgent-*-linux-amd64.AppImage
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Linux arm64
  # ─────────────────────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Go Agent (Linux arm64)
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME}"
          HASH="$(git log -n1 --pretty=format:'%h-%cd' --date=format:%y%m%d)"
          mkdir -p ../resources/binaries
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.buildVersion=${VERSION} \
              -X main.gitHash=${HASH} \
              -X main.release=true" \
            -o=../resources/binaries/agent-aarch64-unknown-linux-gnu ./main.go

      - name: Download FFmpeg (Linux arm64 static)
        run: |
          mkdir -p resources/binaries
          curl -L -o /tmp/ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz"
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          FF_DIR=$(ls -d /tmp/ffmpeg-master-*-linuxarm64-gpl 2>/dev/null | head -1)
          cp "${FF_DIR}/bin/ffmpeg" resources/binaries/ffmpeg-aarch64-unknown-linux-gnu
          cp "${FF_DIR}/bin/ffprobe" resources/binaries/ffprobe-aarch64-unknown-linux-gnu
          chmod +x resources/binaries/ffmpeg-aarch64-unknown-linux-gnu resources/binaries/ffprobe-aarch64-unknown-linux-gnu

      - name: Verify sidecar binaries
        run: |
          echo "=== binaries ==="
          ls -lh resources/binaries/
          file resources/binaries/agent-aarch64-unknown-linux-gnu
          file resources/binaries/ffmpeg-aarch64-unknown-linux-gnu
          file resources/binaries/ffprobe-aarch64-unknown-linux-gnu

      - name: Build frontend + Electron
        run: npx vite build

      - name: Package Electron app (Linux arm64)
        run: npx electron-builder --linux --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd release
          for f in *.AppImage; do
            mv "$f" "FFAgent-${VERSION}-linux-arm64.AppImage"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFAgent-linux-arm64
          path: release/FFAgent-*-linux-arm64.AppImage
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # 发布 GitHub Release
  # ─────────────────────────────────────────────────────────────
  publish-release:
    needs: [build-macos-arm64, build-windows-amd64, build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/FFAgent-darwin-arm64/*.dmg
            artifacts/FFAgent-windows-amd64/*.exe
            artifacts/FFAgent-linux-amd64/*.AppImage
            artifacts/FFAgent-linux-arm64/*.AppImage
