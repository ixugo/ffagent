name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "22"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Go Agent (macOS arm64)
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME}"
          HASH="$(git log -n1 --pretty=format:'%h-%cd' --date=format:%y%m%d)"
          mkdir -p ../src-tauri/binaries
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.buildVersion=${VERSION} \
              -X main.gitHash=${HASH} \
              -X main.release=true" \
            -o=../src-tauri/binaries/agent-aarch64-apple-darwin ./main.go

      - name: Download FFmpeg (macOS arm64 static)
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/ffmpeg.zip "https://www.osxexperts.net/ffmpeg80arm.zip"
          curl -L -o /tmp/ffprobe.zip "https://www.osxexperts.net/ffprobe80arm.zip"
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg-dl
          unzip -o /tmp/ffprobe.zip -d /tmp/ffprobe-dl
          cp /tmp/ffmpeg-dl/ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp /tmp/ffprobe-dl/ffprobe src-tauri/binaries/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin src-tauri/binaries/ffprobe-aarch64-apple-darwin
          xattr -dr com.apple.quarantine src-tauri/binaries/ffmpeg-aarch64-apple-darwin src-tauri/binaries/ffprobe-aarch64-apple-darwin || true
          codesign -s - src-tauri/binaries/ffmpeg-aarch64-apple-darwin src-tauri/binaries/ffprobe-aarch64-apple-darwin

      - name: Verify sidecar binaries
        run: |
          echo "=== binaries ==="
          ls -lh src-tauri/binaries/
          echo "=== agent ==="
          file src-tauri/binaries/agent-aarch64-apple-darwin
          echo "=== ffmpeg ==="
          file src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          file src-tauri/binaries/ffprobe-aarch64-apple-darwin
          src-tauri/binaries/ffmpeg-aarch64-apple-darwin -version 2>&1 | head -1

      - name: Build Tauri app (macOS arm64)
        run: yarn tauri build --bundles dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v5
        with:
          name: FFAgent-macos-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: agent/go.sum

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Go Agent (Windows amd64)
        working-directory: agent
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          HASH="$(git log -n1 --pretty=format:'%h-%cd' --date=format:%y%m%d)"
          mkdir -p ../src-tauri/binaries
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.buildVersion=${VERSION} \
              -X main.gitHash=${HASH} \
              -X main.release=true" \
            -o=../src-tauri/binaries/agent-x86_64-pc-windows-msvc.exe ./main.go

      - name: Download FFmpeg (Windows amd64)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg-win" -Force
          $ffDir = Get-ChildItem "$env:TEMP\ffmpeg-win" -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)\bin\ffmpeg.exe" "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item "$($ffDir.FullName)\bin\ffprobe.exe" "src-tauri\binaries\ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Verify sidecar binaries
        shell: bash
        run: |
          echo "=== binaries ==="
          ls -lh src-tauri/binaries/
          echo "=== agent ==="
          file src-tauri/binaries/agent-x86_64-pc-windows-msvc.exe
          echo "=== ffmpeg ==="
          file src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          file src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (Windows amd64)
        run: yarn tauri build --bundles nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: FFAgent-windows-amd64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/FFAgent-macos-arm64/*.dmg
            artifacts/FFAgent-windows-amd64/*.exe
