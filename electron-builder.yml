appId: com.ffagent.app
productName: FFAgent
directories:
  buildResources: resources
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/node_modules/**"
  - "!**/*.md"
  - "!**/LICENSE*"
asar: true
mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.utilities
  extraResources:
    - from: resources/binaries/
      to: binaries/
      filter:
        - "agent-aarch64-apple-darwin"
        - "ffmpeg-aarch64-apple-darwin"
        - "ffprobe-aarch64-apple-darwin"
dmg:
  sign: false
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  extraResources:
    - from: resources/binaries/
      to: binaries/
      filter:
        - "agent-x86_64-pc-windows-msvc.exe"
        - "ffmpeg-x86_64-pc-windows-msvc.exe"
        - "ffprobe-x86_64-pc-windows-msvc.exe"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  category: AudioVideo
  extraResources:
    - from: resources/binaries/
      to: binaries/
      filter:
        - "agent-*-unknown-linux-gnu"
        - "ffmpeg-*-unknown-linux-gnu"
        - "ffprobe-*-unknown-linux-gnu"
